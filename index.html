<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scientific Calculator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #0f0f1a 0%, #1a1a2e 50%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }

        body::before {
            content: '';
            position: absolute;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(138, 43, 226, 0.15) 0%, transparent 70%);
            top: -100px;
            right: -100px;
            animation: pulse 8s ease-in-out infinite;
        }

        body::after {
            content: '';
            position: absolute;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(0, 191, 255, 0.12) 0%, transparent 70%);
            bottom: -100px;
            left: -100px;
            animation: pulse 10s ease-in-out infinite reverse;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.5; }
            50% { transform: scale(1.2); opacity: 0.8; }
        }

        .calculator {
            background: rgba(20, 20, 35, 0.7);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 24px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4),
                        0 0 80px rgba(138, 43, 226, 0.15);
            max-width: 420px;
            width: 100%;
            position: relative;
            z-index: 1;
        }

        .display {
            background: rgba(10, 10, 20, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 20px;
            min-height: 120px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            box-shadow: inset 0 2px 8px rgba(0, 0, 0, 0.3);
        }

        .mode-indicator {
            font-size: 0.75rem;
            color: #00bfff;
            font-weight: 600;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .memory-indicator {
            color: #ffa500;
            font-size: 0.7rem;
        }

        .expression {
            font-family: 'Share Tech Mono', 'Courier New', monospace;
            font-size: 1rem;
            color: rgba(255, 255, 255, 0.6);
            text-align: right;
            min-height: 24px;
            word-wrap: break-word;
            margin-bottom: 8px;
        }

        .result {
            font-family: 'Share Tech Mono', 'Courier New', monospace;
            font-size: 2.5rem;
            color: #ffffff;
            text-align: right;
            word-wrap: break-word;
            font-weight: 500;
        }

        .buttons {
            display: grid;
            gap: 8px;
        }

        .scientific-section {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 8px;
            margin-bottom: 12px;
        }

        .standard-section {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
        }

        button {
            font-family: 'Inter', system-ui, sans-serif;
            font-size: 0.95rem;
            font-weight: 500;
            padding: 18px 8px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            color: #ffffff;
            background: rgba(40, 40, 60, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
        }

        button:hover {
            transform: translateY(-2px) scale(1.02);
            box-shadow: 0 4px 16px rgba(138, 43, 226, 0.3);
            border-color: rgba(255, 255, 255, 0.2);
        }

        button:active {
            transform: translateY(0) scale(0.98);
        }

        button.active-key {
            transform: scale(0.95);
            box-shadow: 0 0 20px rgba(138, 43, 226, 0.6);
        }

        .btn-number {
            background: rgba(50, 50, 70, 0.6);
        }

        .btn-number:hover {
            box-shadow: 0 4px 16px rgba(100, 100, 150, 0.4);
        }

        .btn-operator {
            background: linear-gradient(135deg, rgba(138, 43, 226, 0.6), rgba(75, 0, 130, 0.6));
            font-weight: 600;
        }

        .btn-operator:hover {
            box-shadow: 0 4px 20px rgba(138, 43, 226, 0.6);
        }

        .btn-scientific {
            background: rgba(0, 100, 120, 0.5);
            font-size: 0.85rem;
        }

        .btn-scientific:hover {
            box-shadow: 0 4px 16px rgba(0, 191, 255, 0.4);
        }

        .btn-clear {
            background: linear-gradient(135deg, rgba(220, 20, 60, 0.6), rgba(178, 34, 34, 0.6));
            font-weight: 600;
        }

        .btn-clear:hover {
            box-shadow: 0 4px 20px rgba(220, 20, 60, 0.6);
        }

        .btn-equals {
            background: linear-gradient(135deg, rgba(0, 191, 255, 0.7), rgba(30, 144, 255, 0.7));
            font-weight: 600;
            font-size: 1.2rem;
        }

        .btn-equals:hover {
            box-shadow: 0 4px 20px rgba(0, 191, 255, 0.7);
        }

        .btn-memory {
            background: rgba(255, 165, 0, 0.5);
            font-size: 0.85rem;
        }

        .btn-memory:hover {
            box-shadow: 0 4px 16px rgba(255, 165, 0, 0.5);
        }

        .span-2 {
            grid-column: span 2;
        }

        @media (max-width: 480px) {
            .calculator {
                padding: 16px;
                max-width: 100%;
            }

            .result {
                font-size: 2rem;
            }

            .expression {
                font-size: 0.9rem;
            }

            button {
                padding: 14px 6px;
                font-size: 0.85rem;
            }

            .btn-scientific {
                font-size: 0.75rem;
            }
        }

        .error {
            color: #ff6b6b !important;
        }
    </style>
</head>
<body>
    <div class="calculator">
        <div class="display">
            <div class="mode-indicator">
                <span id="angleMode">DEG</span>
                <span class="memory-indicator" id="memoryIndicator"></span>
            </div>
            <div class="expression" id="expression"></div>
            <div class="result" id="result">0</div>
        </div>
        
        <div class="buttons">
            <!-- Scientific Functions Section -->
            <div class="scientific-section">
                <button class="btn-scientific" data-action="deg-rad">DEG/RAD</button>
                <button class="btn-scientific" data-function="sin">sin</button>
                <button class="btn-scientific" data-function="cos">cos</button>
                <button class="btn-scientific" data-function="tan">tan</button>
                <button class="btn-scientific" data-function="log">log</button>
                
                <button class="btn-scientific" data-function="pi">π</button>
                <button class="btn-scientific" data-function="asin">sin⁻¹</button>
                <button class="btn-scientific" data-function="acos">cos⁻¹</button>
                <button class="btn-scientific" data-function="atan">tan⁻¹</button>
                <button class="btn-scientific" data-function="ln">ln</button>
                
                <button class="btn-scientific" data-function="e">e</button>
                <button class="btn-scientific" data-function="sinh">sinh</button>
                <button class="btn-scientific" data-function="cosh">cosh</button>
                <button class="btn-scientific" data-function="tanh">tanh</button>
                <button class="btn-scientific" data-function="log2">log₂</button>
                
                <button class="btn-scientific" data-function="square">x²</button>
                <button class="btn-scientific" data-function="cube">x³</button>
                <button class="btn-scientific" data-function="power">xⁿ</button>
                <button class="btn-scientific" data-function="sqrt">√</button>
                <button class="btn-scientific" data-function="cbrt">∛</button>
                
                <button class="btn-scientific" data-function="nroot">ⁿ√</button>
                <button class="btn-scientific" data-function="factorial">n!</button>
                <button class="btn-scientific" data-function="abs">|x|</button>
                <button class="btn-scientific" data-function="reciprocal">1/x</button>
                <button class="btn-scientific" data-function="percent">%</button>
            </div>

            <!-- Memory Functions -->
            <div class="scientific-section">
                <button class="btn-memory" data-action="mc">MC</button>
                <button class="btn-memory" data-action="mr">MR</button>
                <button class="btn-memory" data-action="m-plus">M+</button>
                <button class="btn-memory" data-action="m-minus">M−</button>
                <button class="btn-memory" data-action="ans">Ans</button>
            </div>

            <!-- Standard Calculator Section -->
            <div class="standard-section">
                <button class="btn-clear" data-action="ac">AC</button>
                <button class="btn-clear" data-action="clear">C</button>
                <button class="btn-operator" data-action="backspace">⌫</button>
                <button class="btn-operator" data-operator="/">÷</button>

                <button class="btn-number" data-number="7">7</button>
                <button class="btn-number" data-number="8">8</button>
                <button class="btn-number" data-number="9">9</button>
                <button class="btn-operator" data-operator="*">×</button>

                <button class="btn-number" data-number="4">4</button>
                <button class="btn-number" data-number="5">5</button>
                <button class="btn-number" data-number="6">6</button>
                <button class="btn-operator" data-operator="-">−</button>

                <button class="btn-number" data-number="1">1</button>
                <button class="btn-number" data-number="2">2</button>
                <button class="btn-number" data-number="3">3</button>
                <button class="btn-operator" data-operator="+">+</button>

                <button class="btn-number" data-action="plusminus">+/−</button>
                <button class="btn-number" data-number="0">0</button>
                <button class="btn-number" data-number=".">.</button>
                <button class="btn-equals" data-action="equals">=</button>
            </div>

            <!-- Parentheses -->
            <div class="standard-section" style="grid-template-columns: repeat(2, 1fr);">
                <button class="btn-scientific" data-function="(">(</button>
                <button class="btn-scientific" data-function=")">)</button>
            </div>
        </div>
    </div>

    <script>
        class ScientificCalculator {
            constructor() {
                this.expression = '';
                this.result = '0';
                this.lastResult = 0;
                this.memory = 0;
                this.angleMode = 'DEG'; // DEG or RAD
                this.waitingForOperand = false;
                this.pendingFunction = null;
                
                this.expressionDisplay = document.getElementById('expression');
                this.resultDisplay = document.getElementById('result');
                this.angleModeDisplay = document.getElementById('angleMode');
                this.memoryIndicator = document.getElementById('memoryIndicator');
                
                this.initEventListeners();
                this.updateDisplay();
            }

            initEventListeners() {
                // Button clicks
                document.querySelectorAll('button').forEach(button => {
                    button.addEventListener('click', (e) => {
                        this.handleButtonClick(e.target);
                    });
                });

                // Keyboard support
                document.addEventListener('keydown', (e) => {
                    this.handleKeyPress(e);
                });
            }

            handleButtonClick(button) {
                const number = button.dataset.number;
                const operator = button.dataset.operator;
                const action = button.dataset.action;
                const func = button.dataset.function;

                this.flashButton(button);

                if (number !== undefined) {
                    this.inputNumber(number);
                } else if (operator) {
                    this.inputOperator(operator);
                } else if (action) {
                    this.handleAction(action);
                } else if (func) {
                    this.handleFunction(func);
                }

                this.updateDisplay();
            }

            handleKeyPress(e) {
                const key = e.key;
                let button = null;

                // Number keys
                if (/^[0-9.]$/.test(key)) {
                    this.inputNumber(key);
                    button = document.querySelector(`[data-number="${key}"]`);
                }
                // Operators
                else if (key === '+' || key === '-' || key === '*' || key === '/') {
                    this.inputOperator(key);
                    button = document.querySelector(`[data-operator="${key}"]`);
                }
                // Enter for equals
                else if (key === 'Enter' || key === '=') {
                    e.preventDefault();
                    this.handleAction('equals');
                    button = document.querySelector('[data-action="equals"]');
                }
                // Escape for AC
                else if (key === 'Escape') {
                    this.handleAction('ac');
                    button = document.querySelector('[data-action="ac"]');
                }
                // Backspace
                else if (key === 'Backspace') {
                    e.preventDefault();
                    this.handleAction('backspace');
                    button = document.querySelector('[data-action="backspace"]');
                }
                // Parentheses
                else if (key === '(') {
                    this.handleFunction('(');
                    button = document.querySelector('[data-function="("]');
                }
                else if (key === ')') {
                    this.handleFunction(')');
                    button = document.querySelector('[data-function=")"]');
                }

                if (button) {
                    this.flashButton(button);
                }

                this.updateDisplay();
            }

            flashButton(button) {
                button.classList.add('active-key');
                setTimeout(() => button.classList.remove('active-key'), 150);
            }

            inputNumber(num) {
                if (this.waitingForOperand) {
                    this.expression = '';
                    this.waitingForOperand = false;
                }

                // Prevent multiple decimal points
                if (num === '.') {
                    const lastNumber = this.expression.split(/[\+\-\*\/\(\)]/).pop();
                    if (lastNumber.includes('.')) return;
                }

                this.expression += num;
                this.calculateLiveResult();
            }

            inputOperator(op) {
                if (this.waitingForOperand) {
                    this.expression = this.lastResult.toString();
                    this.waitingForOperand = false;
                }

                // Replace last operator if expression ends with one
                if (/[\+\-\*\/]$/.test(this.expression)) {
                    this.expression = this.expression.slice(0, -1);
                }

                this.expression += op;
            }

            handleAction(action) {
                switch(action) {
                    case 'ac':
                        this.expression = '';
                        this.result = '0';
                        this.waitingForOperand = false;
                        break;
                    
                    case 'clear':
                        this.expression = '';
                        this.result = '0';
                        break;
                    
                    case 'backspace':
                        if (!this.waitingForOperand) {
                            this.expression = this.expression.slice(0, -1);
                            this.calculateLiveResult();
                        }
                        break;
                    
                    case 'equals':
                        this.calculate();
                        break;
                    
                    case 'plusminus':
                        this.toggleSign();
                        break;
                    
                    case 'deg-rad':
                        this.toggleAngleMode();
                        break;
                    
                    case 'mc':
                        this.memory = 0;
                        this.updateMemoryIndicator();
                        break;
                    
                    case 'mr':
                        this.expression += this.memory.toString();
                        this.calculateLiveResult();
                        break;
                    
                    case 'm-plus':
                        if (this.result !== 'Error') {
                            this.memory += parseFloat(this.result);
                            this.updateMemoryIndicator();
                        }
                        break;
                    
                    case 'm-minus':
                        if (this.result !== 'Error') {
                            this.memory -= parseFloat(this.result);
                            this.updateMemoryIndicator();
                        }
                        break;
                    
                    case 'ans':
                        this.expression += this.lastResult.toString();
                        this.calculateLiveResult();
                        break;
                }
            }

            handleFunction(func) {
                if (this.waitingForOperand && func !== '(' && func !== ')') {
                    this.expression = this.lastResult.toString();
                    this.waitingForOperand = false;
                }

                switch(func) {
                    case 'sin':
                    case 'cos':
                    case 'tan':
                    case 'asin':
                    case 'acos':
                    case 'atan':
                    case 'sinh':
                    case 'cosh':
                    case 'tanh':
                    case 'log':
                    case 'ln':
                    case 'log2':
                    case 'sqrt':
                    case 'cbrt':
                    case 'abs':
                        this.expression += func + '(';
                        break;
                    
                    case 'square':
                        this.expression += '^2';
                        break;
                    
                    case 'cube':
                        this.expression += '^3';
                        break;
                    
                    case 'power':
                        this.expression += '^';
                        break;
                    
                    case 'nroot':
                        this.expression += 'nroot(';
                        break;
                    
                    case 'factorial':
                        this.expression += '!';
                        break;
                    
                    case 'reciprocal':
                        this.expression = '1/(' + this.expression + ')';
                        this.calculateLiveResult();
                        break;
                    
                    case 'percent':
                        this.expression += '/100';
                        break;
                    
                    case 'pi':
                        this.expression += Math.PI.toString();
                        this.calculateLiveResult();
                        break;
                    
                    case 'e':
                        this.expression += Math.E.toString();
                        this.calculateLiveResult();
                        break;
                    
                    case '(':
                    case ')':
                        this.expression += func;
                        break;
                }

                this.calculateLiveResult();
            }

            toggleSign() {
                if (this.waitingForOperand) {
                    this.lastResult = -this.lastResult;
                    this.result = this.lastResult.toString();
                } else {
                    // Toggle sign of the last number in expression
                    const match = this.expression.match(/([\d.]+)$/);
                    if (match) {
                        const num = match[1];
                        const newNum = (-parseFloat(num)).toString();
                        this.expression = this.expression.slice(0, -num.length) + newNum;
                        this.calculateLiveResult();
                    }
                }
            }

            toggleAngleMode() {
                this.angleMode = this.angleMode === 'DEG' ? 'RAD' : 'DEG';
                this.angleModeDisplay.textContent = this.angleMode;
                this.calculateLiveResult();
            }

            updateMemoryIndicator() {
                this.memoryIndicator.textContent = this.memory !== 0 ? 'M' : '';
            }

            calculateLiveResult() {
                if (this.expression === '') {
                    this.result = '0';
                    return;
                }

                try {
                    const result = this.evaluateExpression(this.expression);
                    if (isNaN(result) || !isFinite(result)) {
                        this.result = '0';
                    } else {
                        this.result = this.formatResult(result);
                    }
                } catch (e) {
                    this.result = '0';
                }
            }

            calculate() {
                if (this.expression === '') return;

                try {
                    const result = this.evaluateExpression(this.expression);
                    
                    if (isNaN(result) || !isFinite(result)) {
                        this.result = 'Error';
                        this.resultDisplay.classList.add('error');
                    } else {
                        this.lastResult = result;
                        this.result = this.formatResult(result);
                        this.resultDisplay.classList.remove('error');
                        this.waitingForOperand = true;
                    }
                } catch (e) {
                    this.result = 'Error';
                    this.resultDisplay.classList.add('error');
                }
            }

            evaluateExpression(expr) {
                // Replace operators and functions with JavaScript equivalents
                let jsExpr = expr
                    .replace(/×/g, '*')
                    .replace(/÷/g, '/')
                    .replace(/−/g, '-');

                // Handle factorial
                jsExpr = jsExpr.replace(/(\d+(?:\.\d+)?)\!/g, (match, num) => {
                    return this.factorial(parseFloat(num));
                });

                // Handle power operator
                jsExpr = jsExpr.replace(/([^a-z]\d+(?:\.\d+)?|\d+(?:\.\d+)?)\^(\d+(?:\.\d+)?)/g, (match, base, exp) => {
                    return Math.pow(parseFloat(base), parseFloat(exp));
                });

                // Handle trigonometric functions
                const angleConversion = this.angleMode === 'DEG' ? Math.PI / 180 : 1;
                
                jsExpr = jsExpr.replace(/sin\(/g, `(Math.sin(${angleConversion}*`);
                jsExpr = jsExpr.replace(/cos\(/g, `(Math.cos(${angleConversion}*`);
                jsExpr = jsExpr.replace(/tan\(/g, `(Math.tan(${angleConversion}*`);
                
                jsExpr = jsExpr.replace(/asin\(/g, `(Math.asin(`);
                jsExpr = jsExpr.replace(/acos\(/g, `(Math.acos(`);
                jsExpr = jsExpr.replace(/atan\(/g, `(Math.atan(`);
                
                // Convert back to degrees if needed
                if (this.angleMode === 'DEG') {
                    jsExpr = jsExpr.replace(/Math\.asin\(/g, `(Math.asin(`);
                    jsExpr = jsExpr.replace(/Math\.acos\(/g, `(Math.acos(`);
                    jsExpr = jsExpr.replace(/Math\.atan\(/g, `(Math.atan(`);
                }

                jsExpr = jsExpr.replace(/sinh\(/g, 'Math.sinh(');
                jsExpr = jsExpr.replace(/cosh\(/g, 'Math.cosh(');
                jsExpr = jsExpr.replace(/tanh\(/g, 'Math.tanh(');
                
                jsExpr = jsExpr.replace(/log\(/g, 'Math.log10(');
                jsExpr = jsExpr.replace(/ln\(/g, 'Math.log(');
                jsExpr = jsExpr.replace(/log2\(/g, 'Math.log2(');
                
                jsExpr = jsExpr.replace(/sqrt\(/g, 'Math.sqrt(');
                jsExpr = jsExpr.replace(/cbrt\(/g, 'Math.cbrt(');
                jsExpr = jsExpr.replace(/abs\(/g, 'Math.abs(');
                
                jsExpr = jsExpr.replace(/nroot\(([^,]+),([^)]+)\)/g, (match, n, x) => {
                    return Math.pow(parseFloat(x), 1 / parseFloat(n));
                });

                // Close extra parentheses for angle conversion
                const openParens = (jsExpr.match(/\(/g) || []).length;
                const closeParens = (jsExpr.match(/\)/g) || []).length;
                if (openParens > closeParens) {
                    jsExpr += ')'.repeat(openParens - closeParens);
                }

                // Evaluate using Function constructor (safer than eval)
                const result = Function('"use strict"; return (' + jsExpr + ')')();
                
                // Handle inverse trig in degrees
                if (this.angleMode === 'DEG' && expr.match(/a(sin|cos|tan)\(/)) {
                    return result * (180 / Math.PI);
                }
                
                return result;
            }

            factorial(n) {
                if (n < 0 || n !== Math.floor(n)) return NaN;
                if (n === 0 || n === 1) return 1;
                let result = 1;
                for (let i = 2; i <= n; i++) {
                    result *= i;
                }
                return result;
            }

            formatResult(num) {
                // Handle very large or very small numbers
                if (Math.abs(num) > 1e10 || (Math.abs(num) < 1e-6 && num !== 0)) {
                    return num.toExponential(6);
                }
                
                // Round to avoid floating point errors
                const rounded = Math.round(num * 1e10) / 1e10;
                return rounded.toString();
            }

            updateDisplay() {
                this.expressionDisplay.textContent = this.expression || '';
                this.resultDisplay.textContent = this.result;
            }
        }

        // Initialize calculator when DOM is loaded
        document.addEventListener('DOMContentLoaded', () => {
            new ScientificCalculator();
        });
    </script>
</body>
</html>
